<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 380" width="480" height="380">
  <defs>
    <linearGradient id="psBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#221638"/>
      <stop offset="100%" style="stop-color:#3d2a6e"/>
    </linearGradient>
  </defs>

  <!-- Dark background card -->
  <rect x="20" y="20" width="440" height="340" rx="20" fill="url(#psBg)"/>

  <!-- Decorative circuit lines -->
  <line x1="40" y1="60" x2="120" y2="60" stroke="#ff5d22" stroke-width="1" opacity="0.3"/>
  <line x1="120" y1="60" x2="120" y2="100" stroke="#ff5d22" stroke-width="1" opacity="0.3"/>
  <line x1="120" y1="100" x2="200" y2="100" stroke="#ff5d22" stroke-width="1" opacity="0.3"/>
  <circle cx="120" cy="60" r="3" fill="#ff5d22" opacity="0.5"/>
  <circle cx="120" cy="100" r="3" fill="#ff5d22" opacity="0.5"/>

  <line x1="440" y1="300" x2="360" y2="300" stroke="#ff5d22" stroke-width="1" opacity="0.3"/>
  <line x1="360" y1="300" x2="360" y2="260" stroke="#ff5d22" stroke-width="1" opacity="0.3"/>
  <circle cx="360" cy="300" r="3" fill="#ff5d22" opacity="0.5"/>

  <!-- Central rocket launch illustration -->
  <!-- Launch pad -->
  <rect x="200" y="290" width="80" height="16" rx="4" fill="#ff5d22" opacity="0.4"/>
  <rect x="220" y="278" width="40" height="16" rx="4" fill="#ff5d22" opacity="0.6"/>

  <!-- Rocket body -->
  <path d="M240 80 C240 80 210 120 210 200 L230 220 L240 215 L250 220 L270 200 C270 120 240 80 240 80Z" fill="#ff5d22"/>
  <!-- Rocket window -->
  <circle cx="240" cy="170" r="14" fill="#ffffff" opacity="0.9"/>
  <circle cx="240" cy="170" r="9" fill="#221638"/>
  <circle cx="240" cy="170" r="5" fill="#ff5d22"/>
  <!-- Rocket fins -->
  <path d="M210 200 L190 230 L210 220Z" fill="#e04010"/>
  <path d="M270 200 L290 230 L270 220Z" fill="#e04010"/>
  <!-- Exhaust flames -->
  <path d="M225 220 Q230 250 240 260 Q250 250 255 220Z" fill="#ffb347" opacity="0.8"/>
  <path d="M230 220 Q235 245 240 252 Q245 245 250 220Z" fill="#ffffff" opacity="0.6"/>

  <!-- Stars / data nodes around rocket -->
  <circle cx="100" cy="150" r="4" fill="#ff5d22" opacity="0.6"/>
  <circle cx="80" cy="200" r="3" fill="#ffffff" opacity="0.3"/>
  <circle cx="130" cy="240" r="5" fill="#ff5d22" opacity="0.4"/>
  <circle cx="380" cy="130" r="4" fill="#ff5d22" opacity="0.6"/>
  <circle cx="400" cy="180" r="3" fill="#ffffff" opacity="0.3"/>
  <circle cx="360" cy="220" r="5" fill="#ff5d22" opacity="0.4"/>
  <circle cx="150" cy="100" r="2" fill="#ffffff" opacity="0.5"/>
  <circle cx="340" cy="90" r="2" fill="#ffffff" opacity="0.5"/>
  <circle cx="420" cy="240" r="2" fill="#ffffff" opacity="0.4"/>
  <circle cx="60" cy="280" r="2" fill="#ffffff" opacity="0.4"/>

  <!-- Text overlay -->
  <text x="240" y="340" font-family="Nunito, Arial, sans-serif" font-weight="800" font-size="14" fill="#ffffff" text-anchor="middle">Launch Your Project</text>
  <text x="240" y="358" font-family="Nunito, Arial, sans-serif" font-size="10" fill="#ff5d22" text-anchor="middle">with Zenakhe Digital Solutions</text>
</svg>
