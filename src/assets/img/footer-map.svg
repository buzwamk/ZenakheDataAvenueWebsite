    fill="none" stroke="#221638" stroke-width="2" opacity="0.15"/>
  <!-- Grid dots representing data points across Africa -->
  <g fill="#ff5d22" opacity="0.25">
    <circle cx="220" cy="80" r="3"/>
    <circle cx="260" cy="70" r="3"/>
    <circle cx="300" cy="90" r="3"/>
    <circle cx="240" cy="120" r="3"/>
    <circle cx="280" cy="130" r="3"/>
    <circle cx="220" cy="160" r="3"/>
    <circle cx="260" cy="150" r="3"/>
    <circle cx="300" cy="160" r="3"/>
    <circle cx="240" cy="200" r="3"/>
    <circle cx="270" cy="220" r="3"/>
    <circle cx="230" cy="250" r="3"/>
  </g>
  <!-- Connection lines between nodes -->
  <g stroke="#ff5d22" stroke-width="1" opacity="0.15">
    <line x1="220" y1="80" x2="260" y2="70"/>
    <line x1="260" y1="70" x2="300" y2="90"/>
    <line x1="220" y1="80" x2="240" y2="120"/>
    <line x1="260" y1="70" x2="280" y2="130"/>
    <line x1="300" y1="90" x2="280" y2="130"/>
    <line x1="240" y1="120" x2="260" y2="150"/>
    <line x1="280" y1="130" x2="300" y2="160"/>
    <line x1="220" y1="160" x2="240" y2="200"/>
    <line x1="260" y1="150" x2="240" y2="200"/>
    <line x1="300" y1="160" x2="270" y2="220"/>
    <line x1="240" y1="200" x2="270" y2="220"/>
    <line x1="270" y1="220" x2="230" y2="250"/>
  </g>
  <!-- Cape Town highlight -->
  <circle cx="215" cy="270" r="8" fill="#ff5d22" opacity="0.6"/>
  <circle cx="215" cy="270" r="14" fill="#ff5d22" opacity="0.2"/>
  <circle cx="215" cy="270" r="20" fill="#ff5d22" opacity="0.1"/>
  <text x="235" y="274" font-family="Nunito, Arial, sans-serif" font-size="10" fill="#221638" opacity="0.5" font-weight="700">Cape Town</text>
