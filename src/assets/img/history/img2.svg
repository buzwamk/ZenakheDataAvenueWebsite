<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 440 280" width="440" height="280">
  <rect x="0" y="0" width="440" height="280" rx="16" fill="#fff3ee"/>
  <rect x="20" y="20" width="400" height="240" rx="12" fill="#221638"/>
  <!-- Year badge -->
  <rect x="40" y="40" width="100" height="40" rx="8" fill="#ff5d22"/>
  <text x="90" y="67" font-family="Nunito, Arial, sans-serif" font-weight="800" font-size="20" fill="#ffffff" text-anchor="middle">2022</text>
  <!-- Product launch: screen with rocket -->
  <rect x="200" y="60" width="180" height="120" rx="10" fill="#2d2050"/>
  <rect x="210" y="70" width="160" height="90" rx="6" fill="#1a1030"/>
  <!-- Screen content: dashboard -->
  <rect x="220" y="100" width="20" height="40" rx="3" fill="#ff5d22" opacity="0.6"/>
  <rect x="248" y="88" width="20" height="52" rx="3" fill="#ff5d22" opacity="0.8"/>
  <rect x="276" y="78" width="20" height="62" rx="3" fill="#ff5d22"/>
  <rect x="304" y="92" width="20" height="48" rx="3" fill="#ff5d22" opacity="0.7"/>
  <polyline points="230,98 258,86 286,76 314,90" stroke="#ffffff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <!-- Screen stand -->
  <rect x="275" y="180" width="10" height="20" rx="2" fill="#2d2050"/>
  <rect x="255" y="198" width="50" height="6" rx="3" fill="#2d2050"/>
  <!-- Launch badge -->
  <rect x="40" y="140" width="130" height="70" rx="10" fill="#ff5d22"/>
  <text x="105" y="168" font-family="Nunito, Arial, sans-serif" font-weight="800" font-size="13" fill="#ffffff" text-anchor="middle">First Product</text>
  <text x="105" y="185" font-family="Nunito, Arial, sans-serif" font-size="10" fill="#ffffff" text-anchor="middle" opacity="0.85">Launched 🚀</text>
  <!-- Caption -->
  <text x="220" y="235" font-family="Nunito, Arial, sans-serif" font-weight="700" font-size="12" fill="#ffffff">Analytics Platform v1.0</text>
  <text x="220" y="252" font-family="Nunito, Arial, sans-serif" font-size="10" fill="#ff5d22">Internal data product shipped</text>
</svg>
