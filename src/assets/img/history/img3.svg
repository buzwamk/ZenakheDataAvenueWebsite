<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 440 280" width="440" height="280">
  <rect x="0" y="0" width="440" height="280" rx="16" fill="#f0fff4"/>
  <rect x="20" y="20" width="400" height="240" rx="12" fill="#221638"/>
  <!-- Year badge -->
  <rect x="40" y="40" width="100" height="40" rx="8" fill="#007A4D"/>
  <text x="90" y="67" font-family="Nunito, Arial, sans-serif" font-weight="800" font-size="20" fill="#ffffff" text-anchor="middle">2023</text>
  <!-- Client onboard: handshake over contract -->
  <rect x="190" y="70" width="200" height="140" rx="10" fill="#2d2050"/>
  <!-- Contract document -->
  <rect x="210" y="85" width="100" height="130" rx="6" fill="#ffffff"/>
  <line x1="222" y1="105" x2="298" y2="105" stroke="#221638" stroke-width="2" stroke-linecap="round" opacity="0.3"/>
  <line x1="222" y1="118" x2="298" y2="118" stroke="#221638" stroke-width="2" stroke-linecap="round" opacity="0.3"/>
  <line x1="222" y1="131" x2="280" y2="131" stroke="#221638" stroke-width="2" stroke-linecap="round" opacity="0.3"/>
  <line x1="222" y1="144" x2="290" y2="144" stroke="#221638" stroke-width="2" stroke-linecap="round" opacity="0.3"/>
  <!-- Signature line -->
  <line x1="222" y1="185" x2="298" y2="185" stroke="#ff5d22" stroke-width="1.5" stroke-linecap="round"/>
  <path d="M222 185 Q235 175 245 185 Q255 195 265 185 Q275 175 285 185" stroke="#ff5d22" stroke-width="2" fill="none" stroke-linecap="round"/>
  <!-- Tick / approved stamp -->
  <circle cx="320" cy="100" r="22" fill="#007A4D"/>
  <polyline points="310,100 317,108 332,92" stroke="#ffffff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <!-- Stat badge -->
  <rect x="40" y="140" width="130" height="70" rx="10" fill="#ff5d22"/>
  <text x="105" y="168" font-family="Nunito, Arial, sans-serif" font-weight="800" font-size="13" fill="#ffffff" text-anchor="middle">First Client</text>
  <text x="105" y="185" font-family="Nunito, Arial, sans-serif" font-size="10" fill="#ffffff" text-anchor="middle" opacity="0.85">60% faster reporting</text>
  <!-- Caption -->
  <text x="220" y="235" font-family="Nunito, Arial, sans-serif" font-weight="700" font-size="12" fill="#ffffff">First Client Onboarded</text>
  <text x="220" y="252" font-family="Nunito, Arial, sans-serif" font-size="10" fill="#007A4D">Custom analytics dashboard delivered</text>
</svg>
