<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 60" width="280" height="60">
  <defs>
    <linearGradient id="zGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ff5d22;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e04010;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Icon mark: Z with data nodes -->
  <rect x="4" y="4" width="44" height="44" rx="8" fill="#221638"/>
  <!-- Z letterform -->
  <line x1="12" y1="13" x2="38" y2="13" stroke="#ff5d22" stroke-width="3.5" stroke-linecap="round"/>
  <line x1="38" y1="13" x2="12" y2="39" stroke="#ff5d22" stroke-width="3" stroke-linecap="round"/>
  <line x1="12" y1="39" x2="38" y2="39" stroke="#ff5d22" stroke-width="3.5" stroke-linecap="round"/>
  <!-- Data node dots -->
  <circle cx="12" cy="13" r="2.5" fill="#ffffff"/>
  <circle cx="38" cy="13" r="2.5" fill="#ffffff"/>
  <circle cx="25" cy="26" r="2" fill="#ff5d22"/>
  <circle cx="12" cy="39" r="2.5" fill="#ffffff"/>
  <circle cx="38" cy="39" r="2.5" fill="#ffffff"/>
  <!-- Brand name -->
  <text x="58" y="24" font-family="Nunito, Arial, sans-serif" font-weight="800" font-size="16" fill="#221638">Zenakhe</text>
  <text x="58" y="43" font-family="Nunito, Arial, sans-serif" font-weight="600" font-size="12" fill="#ff5d22" letter-spacing="1">DIGITAL SOLUTIONS</text>
</svg>
