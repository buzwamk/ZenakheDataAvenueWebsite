<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 70 70" width="70" height="70">
  <!-- AI & ML: neural network nodes -->
  <rect x="5" y="5" width="60" height="60" rx="12" fill="#fff3ee"/>
  <!-- Connections -->
  <line x1="18" y1="20" x2="35" y2="35" stroke="#ff5d22" stroke-width="1.5" opacity="0.5"/>
  <line x1="18" y1="35" x2="35" y2="35" stroke="#ff5d22" stroke-width="1.5" opacity="0.5"/>
  <line x1="18" y1="50" x2="35" y2="35" stroke="#ff5d22" stroke-width="1.5" opacity="0.5"/>
  <line x1="35" y1="25" x2="52" y2="20" stroke="#ff5d22" stroke-width="1.5" opacity="0.5"/>
  <line x1="35" y1="35" x2="52" y2="35" stroke="#ff5d22" stroke-width="1.5" opacity="0.5"/>
  <line x1="35" y1="45" x2="52" y2="50" stroke="#ff5d22" stroke-width="1.5" opacity="0.5"/>
  <line x1="35" y1="25" x2="52" y2="50" stroke="#ff5d22" stroke-width="1" opacity="0.3"/>
  <!-- Input nodes -->
  <circle cx="18" cy="20" r="5" fill="#221638"/>
  <circle cx="18" cy="35" r="5" fill="#221638"/>
  <circle cx="18" cy="50" r="5" fill="#221638"/>
  <!-- Hidden nodes -->
  <circle cx="35" cy="25" r="5" fill="#ff5d22"/>
  <circle cx="35" cy="35" r="6" fill="#ff5d22"/>
  <circle cx="35" cy="45" r="5" fill="#ff5d22"/>
  <!-- Output nodes -->
  <circle cx="52" cy="20" r="5" fill="#221638"/>
  <circle cx="52" cy="35" r="5" fill="#221638"/>
  <circle cx="52" cy="50" r="5" fill="#221638"/>
</svg>
