<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 70 70" width="70" height="70">
  <!-- Web Development: browser window with code -->
  <rect x="5" y="5" width="60" height="60" rx="12" fill="#fff3ee"/>
  <!-- Browser chrome -->
  <rect x="10" y="14" width="50" height="38" rx="5" fill="#221638"/>
  <rect x="10" y="14" width="50" height="12" rx="5" fill="#2d2050"/>
  <rect x="10" y="20" width="50" height="6" fill="#2d2050"/>
  <!-- Traffic lights -->
  <circle cx="18" cy="20" r="2.5" fill="#ff5d22"/>
  <circle cx="25" cy="20" r="2.5" fill="#ffb347"/>
  <circle cx="32" cy="20" r="2.5" fill="#4caf50"/>
  <!-- URL bar -->
  <rect x="38" y="16" width="18" height="8" rx="3" fill="#ffffff" opacity="0.15"/>
  <!-- Code lines -->
  <line x1="16" y1="34" x2="30" y2="34" stroke="#ff5d22" stroke-width="2" stroke-linecap="round"/>
  <line x1="16" y1="40" x2="44" y2="40" stroke="#ffffff" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/>
  <line x1="16" y1="46" x2="36" y2="46" stroke="#ffffff" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/>
  <line x1="20" y1="34" x2="20" y2="46" stroke="#ff5d22" stroke-width="1.5" stroke-linecap="round" opacity="0.3"/>
</svg>
