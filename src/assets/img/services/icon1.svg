<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 70 70" width="70" height="70">
  <!-- Data Analytics: bar chart with trend line -->
  <rect x="5" y="5" width="60" height="60" rx="12" fill="#fff3ee"/>
  <!-- Bars -->
  <rect x="14" y="38" width="10" height="18" rx="3" fill="#ff5d22"/>
  <rect x="30" y="26" width="10" height="30" rx="3" fill="#ff5d22" opacity="0.8"/>
  <rect x="46" y="18" width="10" height="38" rx="3" fill="#ff5d22" opacity="0.6"/>
  <!-- Trend line -->
  <polyline points="14,42 30,30 46,22 60,16" stroke="#221638" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill="none" stroke-dasharray="0"/>
  <circle cx="60" cy="16" r="3" fill="#221638"/>
</svg>
